<!DOCTYPE html>

<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabalhando com formulários</title>
</head>

<body>
    <h1>Conhecendo o formulário</h1>
    <hr>
    <h2>Form</h2>
    <p>No HTML a tag <code> &lt;form&gt;</code> serve para coletar dados do usuário e envialos para algum destino,
        normalmente um servidor ou uma aplicação</p>
    <!-- usa o & e aperta as teclas (Ctrl) + (espaço) para aparecer "tags" (não sei se é assim que fala) e isso vai mostrar os simbolos para colocar o seu texto-->
    <!-- (action) ele define para onde os dados do usuário vai quando eles preenchem os dados-->
    <!-- Define para onde os dados coletados serão enviados-->

    <form action="">
        <!-- Elemento (input) - É utilizado para criar uma caixa onde o usuário poderá inserir a informação solicitada  
        atributo (type) - É utilizado para definir o tipo de campo ou comportamento do (input)-->

        <!--O atributo (placeholde) é um texto de exemplo, uma dica do que o usuário vai escrever naquele campo como: "Digite seu nome", ele não é acessível, é um recurso visual e pessoas cegas ou com baixa visão não consegue interpretar, vamos identificar o campo com o (label) que é um rótulo/etiqueta-->

        <!-- (label) Serve para indicar o propósito do (input)-->

        <!-- (placeholder) - serve como texto temporário de exemplo para que o usuário saiba como preencher ou interagir com aquele campo-->
        <!-- (label) - etiqueta - É responsável por identificar o campo de um formulário. Esse recurso diferente do (placeholder) é totalmente acessível-->

        <!-- (id) - serve para identificar de forma única um elemento -->
        <!-- (for) - serve para associar um rótulo a um elemento do formulário-->

        <label for="text">Nome:</label>
        <input type="text" placeholder="Digite o seu nome" id="text">
        <br>
        <label for="password">Senha:</label>
        <input type="password" placeholder="Digite sua senha" id="password"><br>

        <label for="confirme-password">confirmar senha:</label>
        <input type="password" placeholder="confirme sua senha" id="confirme-password">

        <button type="submit">Enviar</button>
        <!-- No (button) é sempre bom colocar o (type - submit) para não ser pego de surpresa
        o (type - reset) - vai limpar todas as informações do formulário, vaii resetar tudo que você preencheu-->
    </form>
    <hr>

    <h2>Faça login</h2>
    <form action="">
        <label for="email">Email:</label>
        <input type="email" placeholder="Seu@email.com" id="email">
        <br>

        <label for="login-password">Senha:</label>
        <input type="password" placeholder="***********" id="login-password">

        <button type="submit">Entrar</button>
    </form>
    <hr>

    <h2>Cadastre-se</h2>
    <form action="">
        <label for="name-text">Nome:</label><br>
        <input type="text" placeholder="Ex: Alyne Cristina" id="name-text" required> <br>

        <label for="cadastro-email">Email:</label><br>
        <input type="email" placeholder="Seu@email.com" id="cadastro-email" required> <br>

        <label for="cadastro-senha">Senha (mínimo 6 caracteres)</label><br>
        <input type="password" placeholder="************" id="cadastro-senha" required minlength="6"> <br>

        <label for="aceitar-termos">Li e aceito os termos</label>
        <input type="checkbox" id="aceitar-termos" required>
        <br>

        <button type="submit"> Cadastrar</button>
        <!-- (required) - Vamos colocar esse atributo para dizer que o campo "Nome, email ou senha" é obrigatório preencher-->


    </form>
    <hr>

    <h2>Testando outros recursos do formulário</h2>
    <form action="">
        <input type="radio" name="linguagem" id="html" value="HTML">
        <label for="html">HTML</label> <br>

        <input type="radio" name="linguagem" id="css" value="CSS">
        <label for="css">CSS</label> <br>

        <input type="radio" name="linguagem" id="javascript" value="JavaScriptp">
        <label for="javascript">JavaScript</label><br>

        <label for="mensagem">Deixe sua mensagem</label><br>
        <textarea name="mensagem" id="mensagem" placeholder="Olá, digite sua mensagem" rows="7" cols="40"></textarea>
        <button type="submit">Enviar dados</button>
    </form>
    <!--Se o usuário vai selecionar varias caixinhas é <checkbox> e se vai selecionar só uma é <radio>-->
    <!--Não é obrigatorio passar conteúdo dentro do <Textarea>-->
    <!--Row - Linhas-->
    <!-- Cols - Colunas-->

    <!-- Input text ´pe para texto simples e o textarea é para o usuário escrever um texto longo-->



</body>

</html>
