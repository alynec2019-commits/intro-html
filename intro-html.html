<!DOCTYPE html>
<!--serve para garantir que o navegador interprete o código corretamente, na versão mais atual do HTML, que é a versão 5-->

<!-- HTML - é a raiz do do documento, ou seja, tudo começa aqui. todo o conteudo da pagina fica dentro do HTML-->
<html lang="pt-br">
<!-- lang/language/idioma - indica o idioma principal da pagina (agora é pt-br) que é o portugues do Brasil "sempre colocar o br"-->

<head>
    <!-- o head/cabeça do documento, ela fica invisível na pagina, serve para guardar informaçoes do site/pagina como titulo, link, imagens -->

    <meta charset="UTF-8">
    <!-- "charset" São meta tag, serve para trazer configuraçoes para o nosso site. Converte para um modelo que a gente entende "o texto". garantir que ele interprete as palavras da forma correta-->
    <!-- permite configurar o site para aceitar caracteres especiais, emojis, etc...-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- "(WIDTH) largura e (DEVICE) dispositivo" Isso é para ajustar o conteudo para a largura do dispositivo. -->
    <!-- (INITICAL-SCALE 1.0) é o padrão de 100% do site "o zoom" -->
    <!-- Essa parte do "META" ta falando pro navegador definir a largura do site de acordo com o dispositivo que eu estiver usando como tablet, celular ou computador, e tambem fala pra definir o zoom em 100% que é o padrão.-->
    <title>Document</title>
    <!-- é o titulo do site/documento/pagina, é o nome que fica visivel pro usuario no site/pagina (na aba do navegador)-->
</head>

<body>
    <!-- A tag body/corpo - é a parte de HTML onde fica todo o conteudo visivel do site-->
</body>

</html>
