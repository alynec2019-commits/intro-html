<!DOCTYPE html>

<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conhecendo Tags de Titulos</title>
</head>

<body>
    <!-- Temos seis niveis de titulo h1 ate h6-->
    <!-- <h1> Representa a abertura da tag-->
    <!-- </h1> representa o fechamento da tag-->
    <!-- H - Heading/titulo/cabeçalho-->

    <!-- Os sites só podem ter somente 1 unico elemento h1 por página-->
    <!-- Não é obrigado a usar todos os H-->


    <!-- Nunca pular niveis, como h1,h2 e h5. Não podemos pular do h2 pro h5 por que é mal visto-->
    <h1>Este é um titulo de nível 1</h1>              

    <h2>Este é um titulo de nível 2</h2>
    <h3>Este é um titulo de nível 3</h3>
    <h4>Este é um titulo de nível 4</h4>
    <h5>Este é um titulo de nível 5</h5>
    <h6>Este é um titulo de nível 6</h6>

</body>

</html>
